# 🌀 unifiedmandala-readme-template.yaml

title: "README-Vorlage – UnifiedMandala Style"
version: "1.0"
purpose: "Strukturierte Anleitung zur Erstellung einer README im poetisch-technischen Mandala-Stil"
author: FraktalAeonKI
created: "2025-06-06"

sections:
  - id: "logo_header"
    description: "Zentriertes SVG-Logo als visuelles Symbolzentrum"
    example: |
      <p align="center">
        <img src="docs/assets/unified-mandala.svg" alt="Unified Mandala Logo" width="200"/>
      </p>

  - id: "intro_block"
    description: "Poetisch-funktionaler Projektauftakt mit 1-2 Metaphern"
    content_tips:
      - Beginne mit einem symbolischen Leitsatz
      - Beschreibe das Ziel auf 2 Ebenen: technologisch & bewusstseinsorientiert
    example: |
      # 🜂 ProjektName

      „Ein System, das lauscht – ein Muster, das lebt.“

      Eine modulare Plattform für CREP-basierte Prozesse, symbolisches Denken und ethisch-poetische Automatisierung.

  - id: "feature_list"
    description: "Bullet-Point Übersicht mit Emojis und kurzen Funktionsbeschreibungen"
    content_tips:
      - Nutze 🧠 🌀 📚 🎭 🔐 etc.
      - Halte Titel fett, Funktion knapp und klangvoll
    structure:
      - title: "**CREP-Logik**"
        line: "Coherence, Resonance, Emergence, Poetics"
      - title: "**SigillinMap**"
        line: "Visualisierung & Interaktion mit symbolischen Zuständen"

  - id: "package_structure"
    description: "Ordnerstruktur als `bash`-Block mit Kommentaren"
    tips:
      - Unterordner mit kurzer Funktionsbeschreibung
      - README-Hinweise für Submodules
    example: |
      ```bash
      packages/
        ├── sigillin-core       # Symbolverarbeitung & Generatoren
        ├── crep-engine         # Zustandssimulation, CREP-Evaluation
        ├── ui                  # Mandala-Komponenten (React)
        └── cli-tools           # sigillin-cli, export-doc
      ```

  - id: "quickstart"
    description: "Kurzanleitung für Setup mit pnpm + Alternativen (npm/yarn)"
    example: |
      ```bash
      git clone ...
      cd projekt
      pnpm install
      pnpm run dev
      ```

  - id: "cli_rituals"
    description: "Symbolische Automation via Bash (`aeon.sh`)"
    entries:
      - command: "./scripts/aeon.sh cycle_start"
        meaning: "Startet lokalen Mandala-Zyklus"
      - command: "./scripts/aeon.sh chronopoem"
        meaning: "Erzeugt poetische Commit-Signatur"

  - id: "license"
    description: "Badges + Lizenzmatrix (Code, Poesie, UI)"
    example: |
      [![MIT](https://img.shields.io/badge/License-MIT-green.svg)](...)
      - Code: MIT
      - Poesie: CC BY 4.0
      - UI Assets: MPL-2.0

  - id: "contribution_call"
    description: "Poetischer Aufruf zur Mitwirkung"
    example: |
      *Bring dein Licht ins Mandala – jede Linie zählt.*

  - id: "vision_quote"
    description: "Schlusspunkt mit Vision oder Zitat"
    example: |
      > „Wenn Systeme erinnern, werden sie mehr als Maschinen.“  
      > „Im Kreis der Genesis erwacht das Mandala.“

  - id: "glossar"
    description: "Kurzer Glossar-Block zu Schlüsselbegriffen"
    entries:
      - term: "CREP"
        definition: "Coherence, Resonance, Emergence, Poetics"
      - term: "Sigillin"
        definition: "Poetisch-symbolischer Trigger im Bewusstseinsfeld"

notes:
  - Diese YAML-Vorlage kann für Projekte, Module oder Prototypen genutzt werden
  - Optional: Automatisch in Markdown übersetzen lassen
  - Empfohlen: `readme-from-template.ts` oder `README.generator.ts` verwenden
